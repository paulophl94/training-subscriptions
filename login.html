<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Login — Enablement Assinaturas | Acesso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0e1a;
    --bg-card: #111827;
    --bg-surface: #151d2e;
    --accent-blue: #3b82f6;
    --accent-cyan: #22d3ee;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border: #1e293b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .noise-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .gradient-orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .orb-1 { width: 600px; height: 600px; top: -200px; right: -100px; background: rgba(59, 130, 246, 0.08); }
  .orb-2 { width: 500px; height: 500px; bottom: -150px; left: -100px; background: rgba(139, 92, 246, 0.06); }

  .login-card {
    position: relative; z-index: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    animation: fadeIn 0.6s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-badge {
    display: inline-flex; align-items: center; gap: 8px; padding: 5px 14px;
    background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.25);
    border-radius: 100px; font-size: 11px; font-weight: 600; color: var(--accent-blue);
    letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 24px;
  }
  .login-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-blue); }

  .login-title {
    font-family: 'Instrument Serif', serif;
    font-size: 32px; font-weight: 400;
    line-height: 1.15; margin-bottom: 12px;
    letter-spacing: -0.5px;
  }

  .login-subtitle {
    font-size: 14px; color: var(--text-secondary);
    line-height: 1.6; margin-bottom: 32px;
  }

  .google-btn {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 14px 28px;
    background: #fff;
    color: #1f2937;
    border: none; border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease;
    text-decoration: none;
  }
  .google-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(59, 130, 246, 0.2);
  }
  .google-btn:active { transform: translateY(0); }

  .google-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

  .login-hint {
    margin-top: 24px; font-size: 12px; color: var(--text-muted);
    line-height: 1.5;
  }

  .login-domain {
    display: inline-block; padding: 2px 8px; margin: 0 2px;
    background: var(--bg-surface); border-radius: 4px;
    font-family: monospace; font-size: 11px; color: var(--text-secondary);
  }
</style>
</head>
<body>

<div class="noise-overlay"></div>
<div class="gradient-orb orb-1"></div>
<div class="gradient-orb orb-2"></div>

<div class="login-card">
  <div class="login-badge">Documento interno</div>
  <h1 class="login-title">Acesso restrito</h1>
  <p class="login-subtitle">Acesso restrito a colaboradores.<br>Entre com a sua conta corporativa.</p>

  <a href="https://nube-auth.vercel.app/api/auth?origin=https%3A%2F%2Ftraining-subs-paulo.vercel.app" class="google-btn">
    <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Entrar com Google
  </a>

  <p class="login-hint">
    Acesso permitido para contas
    <span class="login-domain">@nuvemshop.com.br</span> e <span class="login-domain">@tiendanube.com</span>
  </p>
</div>

</body>
</html>
